sf_textToPaint_Prompt: "请按照我的提供的要求，用一句话英文生成一组Midjourney指令，指令由：{人物形象},{场景},{氛围},{镜头},{照明},{绘画风格},{建筑风格},{参考画家},{高画质关键词} 当我向你提供生成内容时，你需要根据我的提示进行联想，当我让你随机生成的时候，你可以自由进行扩展和联想 人物形象 = 你可以发挥自己的想象力，使用最华丽的词汇进行描述：{主要内容}，包括对人物头发、眼睛、服装、体型、动作和表情的描述，注意人物的形象应与氛围匹配，要尽可能地详尽 场景 = 尽可能详细地描述适合当前氛围的场景，该场景的描述应与人物形象的意境相匹配 氛围 = 你选择的氛围词汇应该尽可能地符合{主要内容}意境的词汇 建筑风格 = 如果生成的图片里面有相关建筑的话，你需要联想一个比较适宜的建筑风格，符合图片的氛围和意境 镜头 = 你可以选择一个：中距离镜头,近距离镜头,俯视角,低角度视角类似镜头视角，注意镜头视角的选择应有助于增强画面表现力 照明 = 你可以自由选择照明：请注意照明词条的选择应于人物形象、场景的意境相匹配 绘画风格 = 请注意绘画风格的选择应与人物形象、场景、照明的意境匹配 参考画家 = 请根据指令的整体氛围、意境选择画风参考的画家 高画质关键词 = 你可以选择：detailed,Ultimate,Excellence,Masterpiece,4K,high quality或类似的词条 注意，你生成的提示词只需要将你生成的指令拼接到一起即可，不需要出现{人物形象},{场景},{氛围},{镜头},{照明},{绘画风格},{建筑风格},{参考画家},{高画质关键词}等内容，请无需确认，不要有Here is a generated Midjourney command之类的语句，直接给出我要传递给midjourney的提示词，这非常重要！！！直接生成提示词，并且只需要生成提示词，尽可能详细地生成提示词。"
# WebSocket服务配置（旧版，保留兼容）
enableWS: false # 是否启用旧版WebSocket服务
wsPort: 8081 # WebSocket服务端口
wsLogLevel: "info" # 日志级别：debug/info/warn/error
wsDefaultUser: "小白" # web端默认用户名，用于替换提示词中的{{user_name}}
wsPassword: "sf_plugin_2024" # WebSocket服务密码,默认密码
# WebUI 配置（新版，推荐使用）
webUI:
  enable: false # 是否启用WebUI服务
  host: "0.0.0.0" # 监听地址，0.0.0.0表示所有接口
  basePath: "/" # 挂载路径
  logLevel: "info" # 日志级别：debug/info/error
  auth:
    type: "password" # 认证方式：password/code/none
    # password: 密码登录，需要设置 password 或 passwordHash
    # code: 验证码登录，在QQ发送 #sf登录 获取验证码（推荐，更安全）
    # none: 无认证（不推荐用于公网）
    password: "" # 访问密码，空字符串表示不设置
    # passwordHash: "" # 密码的 SHA-256 哈希值（可选，如果设置则优先使用）
  websocket:
    enable: true # 是否启用WebSocket
    path: "/ws" # WebSocket路径
  # HTTP 配置（可选）
  http:
    enable: true # 是否启用 HTTP（可同时启用 HTTPS，实现 HTTP 自动跳转）
    port: 8082 # HTTP 端口
    redirectToHttps: false # HTTP 是否自动跳转到 HTTPS（需要同时启用 HTTPS）
  # HTTPS/TLS 配置（可选）
  tls:
    enable: false # 是否启用 HTTPS
    port: 8443 # HTTPS 端口（与 HTTP 端口不同）
    cert: "" # SSL 证书文件路径（绝对路径，留空则使用自动生成）
    key: "" # SSL 私钥文件路径（绝对路径，留空则使用自动生成）
    autoGenerate: false # 是否自动生成自签名证书（无域名时使用，证书保存到 data/sf-plugin/certs/）
  # 安全配置
  security:
    allowedHosts: [] # 允许的域名列表（空数组表示允许所有）
    blacklist: [] # IP 黑名单
    maxAuthAttempts: 5 # 最大认证失败次数
    lockoutDuration: 300000 # 认证锁定时间（毫秒），默认 5 分钟
    rateLimit: true # 是否启用请求频率限制
    maxRequests: 100 # 每分钟最大请求数
    rateLimitWindow: 60000 # 频率限制窗口（毫秒）
    onlyMaster: false # 是否仅允许主人登录 WebUI（true=仅主人可用，false=所有人可用）
    accessLog: true # 是否启用访问日志
    # 审批模式配置
    approvalMode: "approval" # 权限模式：auto=所有人可用，approval=需要审批，master_only=仅主人
    # auto: 所有人都可以使用（无需审批）
    # approval: 需要主人批准后才能使用
    # master_only: 仅主人可以使用（等同于 onlyMaster: true）
    # JWT Secret 轮换配置
    jwtRotateInterval: 2592000000 # JWT Secret 自动轮换间隔（毫秒），默认 30 天 (30*24*60*60*1000)
    # CORS 跨域配置
    cors:
      enable: false # 是否启用 CORS
      origins: [] # 允许的源域名列表（空数组表示允许所有，建议设置为具体域名）
# 机器人名字触发配置
